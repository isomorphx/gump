name: spec-impl
description: Implement a spec with dev agent, parallel adversarial review, arbiter, and smoke gate
max_budget: 15.00

steps:
  # ── Step 1: Implementation ──────────────────────────────────
  - name: implement
    agent: claude-opus
    output: diff
    session: reuse-on-retry
    prompt: |
      Implement the {spec}.
      Comment the WHY, not the HOW.
      Run `go test ./e2e/ -v` before submitting.
      {error}
      {diff}
    gate: [compile, test]
    on_failure:
      retry: 3
      strategy: [same, same, same]

  # ── Step 2: Parallel review ─────────────────────────────────
  - name: reviews
    parallel: true
    steps:
      - name: review-codex
        agent: codex
        output: artifact
        session: reuse-on-retry
        prompt: |
          Review the implementation against {spec}.
          Check ONLY spec conformance: types, signatures, validation rules,
          cascade logic, parsing behavior, test coverage.
          Do NOT suggest style changes, naming improvements, or refactors.
          List any deviation from the spec as:
            [DEVIATION] file:line — expected X, found Y.
          If fully conformant, say "Spec conformant" and nothing else.

      - name: review-opus
        agent: claude-opus
        output: artifact
        session: reuse-on-retry
        prompt: |
          Review the implementation against {spec}.
          Check ONLY spec conformance: types, signatures, validation rules,
          cascade logic, parsing behavior, test coverage.
          Do NOT suggest style changes, naming improvements, or refactors.
          List any deviation from the spec as:
            [DEVIATION] file:line — expected X, found Y.
          If fully conformant, say "Spec conformant" and nothing else.

  # ── Step 3: Arbiter ─────────────────────────────────────────
  #   output: review → Pudding injecte le format {pass, comment} via Context Builder.
  #   pass=false → on_failure → restart_from implement avec comment dans {error}.
  #   Pas de gate: — le mode review route nativement sur pass/fail.
  - name: arbiter
    agent: claude-opus
    output: review
    session: reuse-on-retry
    prompt: |
      Below are two independent reviews of the implementation against the spec.

      === Review 1 (Codex) ===
      {steps.review-codex.output}

      === Review 2 (Opus) ===
      {steps.review-opus.output}

      Analyze both reviews. Ignore any stylistic or subjective feedback.
      Focus exclusively on [DEVIATION] items that indicate spec non-conformance.
      Discard false positives by checking each deviation against the spec.
      If confirmed deviations exist, list each as a required fix.
    gate: [schema]
    on_failure:
      retry: 3
      strategy: [same, same, same]
      restart_from: implement

  # ── Step 4: Smoke tests ─────────────────────────────────────
  #   Exit 0 = pass, exit 1 = fail. stderr/stdout injecté dans {error}.
  - name: smoke
    gate: [bash: "make smoke"]
    on_failure:
      retry: 5
      strategy: [same, same, same, same, same]
      restart_from: implement