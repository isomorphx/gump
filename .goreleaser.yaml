version: 2

project_name: pudding

builds:
  - id: pudding
    main: .
    binary: pudding
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X {{.ModulePath}}/internal/version.Version={{.Version}}
      - -X {{.ModulePath}}/internal/version.Commit={{.ShortCommit}}
      - -X {{.ModulePath}}/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "pudding_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: isomorphx
    name: pudding
  draft: false
  prerelease: auto
  extra_files:
    - glob: ./install.sh

brews:
  - name: pudding
    repository:
      owner: isomorphx
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://pudding.build"
    description: "Orchestrate AI coding agents with declarative recipes"
    license: "MIT"
    install: |
      bin.install "pudding"
    test: |
      system "#{bin}/pudding", "--version"

