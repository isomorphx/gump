name: simple
description: Simple plan -> foreach -> final-check (v4)
max_budget: 5.00
steps:
  - name: decompose
    agent: claude-opus
    output: plan
    prompt: |
      Decompose {spec} into tasks.
    gate: [schema]

  - name: implement
    foreach: decompose
    steps:
      - name: code
        agent: claude-opus
        output: diff
        prompt: |
          Implement: {item.description}
        gate: [compile]

  - name: final-check
    agent: claude-opus
    output: diff
    prompt: |
      Final check and cleanup.
    gate: [compile]

