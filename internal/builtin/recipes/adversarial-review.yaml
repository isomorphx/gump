name: adversarial-review
description: Implement then converge via multi-agent adversarial review
max_budget: 12.00

steps:
  - name: decompose
    agent: claude-opus
    output: plan
    prompt: |
      Decompose {spec} into independent items.
    gate: [schema]

  - name: build
    foreach: decompose
    steps:
      - name: impl
        agent: claude-sonnet
        output: diff
        prompt: |
          Implement: {item.description}
          Files: {item.files}
          {steps.arbiter.output}
        gate: [compile, test]
        on_failure:
          retry: 3
          strategy: [same, "escalate: claude-opus"]

      - name: reviews
        parallel: true
        steps:
          - name: arch-review
            agent: claude-opus
            output: review
            session: fresh
            prompt: |
              Review for architectural correctness and code quality.
              Spec: {item.description}
              Diff: {steps.impl.output}

          - name: security-review
            agent: gemini
            output: review
            session: fresh
            prompt: |
              Review for security vulnerabilities and edge cases.
              Diff: {steps.impl.output}

      - name: arbiter
        agent: claude-opus
        output: artifact
        prompt: |
          Analyze both reviews. Decide what to integrate and what to ignore.
          Arch review: {steps.arch-review.output}
          Security review: {steps.security-review.output}
          Produce actionable instructions for the implementer.
    on_failure:
      retry: 3
      restart_from: impl

  - name: quality
    gate: [compile, lint, test, "coverage: 80"]
