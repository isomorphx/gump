name: tdd
description: Test-Driven Development workflow
max_budget: 5.00

steps:
  - name: decompose
    agent: claude-opus
    output: plan
    prompt: |
      Analyze this spec and the codebase. Decompose into independent items.
      For each item, list the files that will be affected.
    gate: [schema]

  - name: build
    foreach: decompose
    steps:
      - name: tests
        agent: claude-haiku
        output: diff
        prompt: |
          Write comprehensive tests for: {item.description}
          Cover edge cases and error conditions.
          Only create/modify test files in: {item.files}
        gate: [compile, "touched: *_test.*", tests_found]
        on_failure:
          retry: 2
          strategy: [same, "escalate: claude-sonnet"]

      - name: impl
        agent: claude-haiku
        output: diff
        session: reuse
        prompt: |
          Implement code to pass all tests.
          Do not modify the tests.
          Only modify implementation files in: {item.files}
        gate: [compile, test, "untouched: *_test.*"]
        on_failure:
          retry: 5
          strategy: ["same: 3", "escalate: claude-sonnet"]
          restart_from: tests

  - name: quality
    gate: [compile, lint, test]
