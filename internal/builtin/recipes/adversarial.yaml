# Test recipe for the three valid session forms (avoids the invalid form "session: reuse: step" on one line).
name: adversarial
description: Test session forms — reuse (self), reuse targeted (block and flow).

steps:
  - name: spec-build
    agent: claude-sonnet
    prompt: build
    validate: []

  - name: spec-refine
    agent: claude-sonnet
    prompt: refine
    validate: []

  - name: step-self-reuse
    agent: claude-sonnet
    prompt: self
    session: reuse
    validate: []

  - name: step-reuse-build
    agent: claude-sonnet
    prompt: use build session
    session:
      reuse: spec-build
    validate: []

  - name: step-reuse-refine
    agent: claude-sonnet
    prompt: use refine session
    session:
      reuse: spec-refine
    validate: []
