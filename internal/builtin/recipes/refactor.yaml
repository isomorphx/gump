name: refactor
description: Safe refactoring with test preservation

steps:
  - name: decompose
    agent: claude-sonnet
    output: plan
    prompt: |
      Plan refactoring for: {spec}
      Ensure each task is independently testable.
      All existing tests must stay green after each task.
    validate:
      - schema: plan

  - name: refactor
    foreach: decompose
    steps:
      - name: apply
        agent: claude-haiku
        prompt: |
          Refactor according to: {task.description}
          Only modify: {task.files}
          All existing tests must continue to pass.
        validate:
          - compile
          - test
        retry:
          max_attempts: 3
          strategy:
            - same
            - escalate: claude-sonnet
            - replan: claude-sonnet

  - name: final-check
    validate:
      - compile
      - lint
      - test
