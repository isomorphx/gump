name: refactor
description: Safe refactoring with test preservation
max_budget: 5.00

steps:
  - name: decompose
    agent: claude-sonnet
    output: plan
    prompt: |
      Plan refactoring for: {spec}
      Ensure each item is independently testable.
      All existing tests must stay green after each item.
    gate: [schema]

  - name: refactor
    foreach: decompose
    steps:
      - name: apply
        agent: claude-haiku
        output: diff
        prompt: |
          Refactor according to: {item.description}
          Only modify: {item.files}
          All existing tests must continue to pass.
        gate: [compile, test]
        on_failure:
          retry: 3
          strategy: [same, "escalate: claude-sonnet", "replan: claude-sonnet"]

  - name: quality
    gate: [compile, lint, test]
